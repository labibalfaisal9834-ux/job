name: Job Watch

on:
  schedule:
    # Runs every 6 hours. The Go program itself decides whether there's
    # actually anything to do (new 4-day batch due, a leftover batch to
    # resume, or nothing) — so most of these runs will be a fast no-op.
    - cron: "0 */6 * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

permissions:
  contents: write # needed to commit the updated state.json back to the repo

concurrency:
  group: jobwatch
  cancel-in-progress: false # never cancel a run that's mid-batch

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run job watcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: go run ./cmd/jobwatch

      - name: Commit updated state
        run: |
          git config user.name "jobwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json

          if git diff --staged --quiet; then
            echo "no state changes to commit"
            exit 0
          fi

          git commit -m "chore: update jobwatch state"

          # The branch may have moved since checkout (e.g. someone edited a
          # file on GitHub while this run was in progress). Rebase onto the
          # latest remote main and retry the push a few times before giving up.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then
              echo "pushed successfully on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            sleep $((RANDOM % 10 + 5))
          done

          echo "failed to push state.json after 5 attempts"
          exit 1
